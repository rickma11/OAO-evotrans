name: Sync from Gitee

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download evolutions.json from Gitee
        run: |
          echo "Downloading evolutions.json from Gitee..."
          curl -s -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          echo "Download completed. File size: $(ls -la evolutions.json)"

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add evolutions.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected, committing..."
            git commit -m "Sync evolutions.json from Gitee"
            echo "Pushing changes..."
            git push
          fi
