name: Sync from Gitee

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Debug information
        run: |
          echo "=== Debug Information ==="
          pwd
          ls -la
          git status
          git branch -a
          git remote -v
          
      - name: Fetch files from Gitee
        run: |
          echo "=== Fetching files from Gitee ==="
          mkdir -p sync-test
          
          echo "Downloading evolutions.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o sync-test/evolutions.json
          if [ $? -eq 0 ]; then
            echo "Download successful. File size: $(ls -la sync-test/evolutions.json)"
            echo "File content (first 500 chars):"
            head -c 500 sync-test/evolutions.json
          else
            echo "Download failed"
          fi
          
          echo "Downloading built-in-dictionaries.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/built-in-dictionaries.json" -o sync-test/built-in-dictionaries.json
          if [ $? -eq 0 ]; then
            echo "Download successful. File size: $(ls -la sync-test/built-in-dictionaries.json)"
            echo "File content (first 500 chars):"
            head -c 500 sync-test/built-in-dictionaries.json
          else
            echo "Download failed"
          fi
          
      - name: Show sync results
        run: |
          echo "=== Sync Results ==="
          ls -la sync-test/
