name: Sync from Gitee

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download evolutions.json from Gitee
        id: download
        run: |
          echo "Downloading evolutions.json from Gitee..."
          curl -s -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          echo "File size: $(ls -la evolutions.json)"
          echo "content=$(cat evolutions.json | jq -R -s .)" >> $GITHUB_OUTPUT

      - name: Update evolutions.json on GitHub
        run: |
          echo "Updating evolutions.json on GitHub..."
          # Get current SHA of the file
          CURRENT_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/rickma11/OAO-evotrans/contents/evolutions.json" | jq -r .sha)
          
          # Update the file using GitHub API
          curl -s -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/rickma11/OAO-evotrans/contents/evolutions.json" \
            -d "{
              \"message\": \"Sync evolutions.json from Gitee\",
              \"content\": \"$(cat evolutions.json | base64)\",
              \"sha\": \"$CURRENT_SHA\"
            }"
