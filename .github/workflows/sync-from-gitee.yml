name: Sync from Gitee

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Debug information
        run: |
          echo "=== Debug Information ==="
          pwd
          ls -la
          git status
          git branch -a
          git remote -v
          echo "GitHub Token exists: ${{ secrets.GITHUB_TOKEN != '' }}"
          
      - name: Fetch files from Gitee
        run: |
          echo "=== Fetching files from Gitee ==="
          echo "Downloading evolutions.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          echo "Download completed. File size: $(ls -la evolutions.json)"
          
          echo "Downloading built-in-dictionaries.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/built-in-dictionaries.json" -o built-in-dictionaries.json
          echo "Download completed. File size: $(ls -la built-in-dictionaries.json)"
          
      - name: Check for changes
        id: check_changes
        run: |
          echo "=== Checking for changes ==="
          git add evolutions.json built-in-dictionaries.json
          git status
          git diff --cached
          
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "=== Committing and pushing changes ==="
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git status
          git commit -m "Sync files from Gitee [skip ci]"
          git status
          git branch -a
          git remote -v
          echo "Current branch: $(git branch --show-current)"
          git push origin HEAD:main -v || {
            echo "Push failed with exit code $?"
            git status
            exit 1
          }
          
      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "No changes to sync"
