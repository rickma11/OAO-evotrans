name: Sync from Gitee

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download evolutions.json from Gitee
        run: |
          curl -s -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          ls -la evolutions.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add evolutions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync evolutions.json from Gitee"
            git push
          fi
