name: Sync from Gitee

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Debug information
        run: |
          echo "=== Debug Information ==="
          pwd
          ls -la
          git status
          git branch -a
          git remote -v
          
      - name: Fetch files from Gitee
        run: |
          echo "=== Fetching files from Gitee ==="
          
          echo "Downloading evolutions.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          if [ $? -eq 0 ]; then
            echo "Download successful. File size: $(ls -la evolutions.json)"
          else
            echo "Download failed"
            exit 1
          fi
          
          echo "Downloading built-in-dictionaries.json from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/built-in-dictionaries.json" -o built-in-dictionaries.json
          if [ $? -eq 0 ]; then
            echo "Download successful. File size: $(ls -la built-in-dictionaries.json)"
          else
            echo "Download failed"
            exit 1
          fi
          
          echo "Downloading OAO-FC26 UT模式翻译插件.user.js from Gitee..."
          curl -v -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/OAO-FC26%20UT%E6%A8%A1%E5%BC%8F%E7%BF%BB%E8%AF%91%E6%8F%92%E4%BB%B6.user.js" -o "OAO-FC26 UT模式翻译插件.user.js"
          if [ $? -eq 0 ]; then
            echo "Download successful. File size: $(ls -la "OAO-FC26 UT模式翻译插件.user.js")"
          else
            echo "Download failed"
            exit 1
          fi
          
      - name: Check for changes
        id: check_changes
        run: |
          echo "=== Checking for changes ==="
          git status
          git add evolutions.json built-in-dictionaries.json "OAO-FC26 UT模式翻译插件.user.js"
          
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff --staged
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "=== Committing and pushing changes ==="
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git status
          git commit -m "Sync files from Gitee [skip ci]"
          git status
          git push origin HEAD:main -v
          
      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "No changes to sync"
