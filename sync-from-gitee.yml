name: Sync from Gitee

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch evolutions.json from Gitee
        run: |
          curl -L "https://gitee.com/rickma11/OAO-evotrans/raw/master/evolutions.json" -o evolutions.json
          
      - name: Check for changes
        id: check_changes
        run: |
          git add evolutions.json
          if git diff --exit-code --cached; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Sync evolutions.json from Gitee [skip ci]"
          git push
          
      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "No changes to sync"
